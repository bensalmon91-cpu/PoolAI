<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - PoolAIssistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e6f2ff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        .offline-icon {
            font-size: 80px;
            margin-bottom: 24px;
            opacity: 0.8;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 12px;
            color: #fff;
        }
        p {
            font-size: 16px;
            color: #9cccff;
            max-width: 400px;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .btn {
            display: inline-block;
            padding: 14px 28px;
            background: #0066cc;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #0052a3;
        }
        .status {
            margin-top: 40px;
            padding: 16px 24px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            font-size: 14px;
        }
        .status.online {
            background: rgba(16, 185, 129, 0.2);
            color: #6ee7b7;
        }
        .retry-info {
            margin-top: 16px;
            font-size: 14px;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="offline-icon">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M1 1l22 22M9 9a3 3 0 0 0 4.24 4.24M21 12a9 9 0 0 0-9-9 8.93 8.93 0 0 0-4.76 1.36M3.34 7A9 9 0 0 0 3 12a9 9 0 0 0 .51 3"></path>
            <path d="M8.53 16.11a6 6 0 0 1-1.42-9.47M14.59 8.41a6 6 0 0 1 .89 7.72"></path>
        </svg>
    </div>

    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Check your network and try again.</p>

    <button class="btn" onclick="tryReconnect()">Try Again</button>

    <div id="status" class="status" style="display: none;"></div>

    <p class="retry-info">We'll automatically reconnect when you're back online.</p>

    <script>
        // Check connection status
        function checkConnection() {
            return navigator.onLine;
        }

        // Try to reconnect
        async function tryReconnect() {
            const statusEl = document.getElementById('status');
            statusEl.style.display = 'block';
            statusEl.className = 'status';
            statusEl.textContent = 'Checking connection...';

            if (checkConnection()) {
                try {
                    // Try to fetch a simple resource
                    const response = await fetch('/manifest.json', { cache: 'no-store' });
                    if (response.ok) {
                        statusEl.className = 'status online';
                        statusEl.textContent = 'Connected! Redirecting...';
                        setTimeout(() => {
                            window.location.href = '/dashboard.php';
                        }, 1000);
                        return;
                    }
                } catch (e) {
                    console.log('Still offline:', e);
                }
            }

            statusEl.textContent = 'Still offline. Please check your connection.';
            setTimeout(() => {
                statusEl.style.display = 'none';
            }, 3000);
        }

        // Auto-reconnect when online
        window.addEventListener('online', () => {
            tryReconnect();
        });

        // Visual feedback when offline
        window.addEventListener('offline', () => {
            const statusEl = document.getElementById('status');
            statusEl.style.display = 'block';
            statusEl.className = 'status';
            statusEl.textContent = 'Connection lost';
        });
    </script>
</body>
</html>
