<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Reset your PoolAIssistant password">
  <meta name="theme-color" content="#0066cc">
  <title>Reset Password | PoolAIssistant</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/icons/favicon-32.png">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-6);
      background: linear-gradient(135deg, #0066cc 0%, #004d99 100%);
    }

    .auth-container {
      width: 100%;
      max-width: 400px;
    }

    .auth-card {
      background: var(--surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      padding: var(--space-8);
    }

    .auth-header {
      text-align: center;
      margin-bottom: var(--space-8);
    }

    .auth-header h1 {
      font-size: 1.5rem;
      margin-bottom: var(--space-2);
      color: var(--primary);
    }

    .auth-header p {
      color: var(--text-secondary);
      margin: 0;
    }

    .auth-form .form-group {
      margin-bottom: var(--space-5);
    }

    .auth-links {
      text-align: center;
      margin-top: var(--space-6);
      padding-top: var(--space-6);
      border-top: 1px solid var(--border);
    }

    .auth-links a {
      color: var(--text-secondary);
      font-size: 0.875rem;
    }

    .auth-links a:hover {
      color: var(--primary);
    }

    .auth-footer {
      text-align: center;
      margin-top: var(--space-6);
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h1>PoolAIssistant</h1>
          <p>Reset your password</p>
        </div>

        <form class="auth-form" action="/api/password/forgot" method="post">
          <div class="form-group">
            <label for="email">Email address</label>
            <input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg">Send Reset Link</button>
        </form>

        <div class="auth-links">
          <a href="login.html">Back to sign in</a>
        </div>
      </div>

      <div class="auth-footer">
        <p>PoolAIssistant &copy; <span id="year"></span></p>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
</body>
</html>
