<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password | PoolDash_v6</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <span class="brand-mark">PoolDash_v6</span>
      <span class="brand-sub">Password Reset</span>
    </div>
    <nav class="site-nav">
      <a href="../index.html">Home</a>
      <a href="advertising.html">Advertising & Sales</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main class="content">
    <section class="hero">
      <h1>Forgot your password?</h1>
      <p class="lead">Enter your email and we will send a reset link.</p>
    </section>

    <section class="card">
      <form class="upload-form" action="/api/password/forgot" method="post">
        <label for="email">Email address</label>
        <input id="email" name="email" type="email" autocomplete="email" required>
        <button type="submit">Send reset link</button>
      </form>
      <p class="helper-text">Backend endpoint: <code>/api/password/forgot</code></p>
    </section>
  </main>

  <footer class="site-footer">
    <span>PoolDash_v6 &copy; <span id="year"></span></span>
  </footer>

  <script src="../js/app.js"></script>
</body>
</html>
