<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | PoolDash_v6</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <span class="brand-mark">PoolDash_v6</span>
      <span class="brand-sub">Client Login</span>
    </div>
    <nav class="site-nav">
      <a href="../index.html">Home</a>
      <a href="advertising.html">Advertising & Sales</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main class="content">
    <section class="hero">
      <h1>Client Login</h1>
      <p class="lead">This login form is a placeholder for the future authentication flow.</p>
    </section>

    <section class="card">
      <form class="upload-form" action="/api/login" method="post">
        <label for="email">Email address</label>
        <input id="email" name="email" type="email" autocomplete="email" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>

        <button type="submit">Sign in</button>
      </form>
      <p class="helper-text">Backend endpoint placeholder: <code>/api/login</code></p>
      <p class="helper-text"><a href="forgot.html">Forgot your password?</a></p>
      <p class="helper-text"><a href="/portal">View client portal (requires login)</a></p>
    </section>
  </main>

  <footer class="site-footer">
    <span>PoolDash_v6 &copy; <span id="year"></span></span>
  </footer>

  <script src="../js/app.js"></script>
</body>
</html>
